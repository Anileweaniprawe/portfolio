<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ikonka strony. Kolory z palety serwisu:
       #3E2723 = espresso (tło paneli), #F4C9D6 = peony (różowy).
       Chcesz inną literę? Zmień treść <text> niżej. -->
  <rect width="100" height="100" rx="24" fill="#3E2723"/>
  <text x="50" y="53"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="bold" letter-spacing="-2"
        fill="#F4C9D6" text-anchor="middle" dominant-baseline="central">E</text>
</svg>
